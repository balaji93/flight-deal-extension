<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>India Flight Deal Finder</title>
  <link rel="stylesheet" href="sidepanel.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h1>Flight Deal<span>Finder</span></h1>
      <p>Save more on your next journey across India</p>
    </header>

    <main>
      <section class="search-form">
        <div class="row">
          <div class="input-group">
            <label for="source">From</label>
            <input type="text" id="source" placeholder="DEL, BOM, BLR..." list="cities">
          </div>
          <div class="input-group">
            <label for="destination">To</label>
            <input type="text" id="destination" placeholder="BOM, DEL, MAA..." list="cities">
          </div>
        </div>

        <div class="row">
          <div class="input-group">
            <label for="date">Travel Date</label>
            <input type="date" id="date">
          </div>
          <div class="input-group">
            <label for="passengers">Passengers</label>
            <input type="number" id="passengers" value="1" min="1">
          </div>
        </div>

        <div class="input-group">
          <label for="banks">Preferred Banks (Optional)</label>
          <div class="bank-chips" id="bank-chips">
            <!-- Chips will be added here -->
            <input type="text" id="bank-input" placeholder="Type bank name (ICICI, HDFC...)">
          </div>
        </div>

        <button id="search-btn" class="primary-btn">Find Best Offers</button>
      </section>

      <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p>Crawling 12+ sites for live deals...</p>
      </div>

      <section id="results" class="results-container hidden">
        <div class="rank-header">
          <h2>Top Ranked Deals</h2>
          <span class="badge">Accurate Pricing</span>
        </div>
        <div id="deals-list">
          <!-- Deal cards will be dynamically inserted here -->
        </div>

        <div id="split-suggestion" class="suggestion-box hidden">
          <div class="suggestion-icon">💡</div>
          <div class="suggestion-content">
            <h3>Pro-Tip: Saving Hack</h3>
            <p id="split-text"></p>
          </div>
        </div>
      </section>
    </main>

    <datalist id="cities">
      <option value="DEL">Delhi</option>
      <option value="BOM">Mumbai</option>
      <option value="BLR">Bengaluru</option>
      <option value="MAA">Chennai</option>
      <option value="HYD">Hyderabad</option>
      <option value="CCU">Kolkata</option>
      <option value="AMD">Ahmedabad</option>
      <option value="PNQ">Pune</option>
    </datalist>

    <footer>
      <p>&copy; 2026 Flight Deal Finder. Prices include convenience fees.</p>
    </footer>
  </div>
  <script type="module" src="sidepanel.js"></script>
</body>
</html>
